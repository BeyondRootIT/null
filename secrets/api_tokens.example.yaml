# Copy to secrets/api_tokens.yaml and replace tokens with strong random values.
# Each token grants the listed scopes; "admin" implies all scopes.
tokens:
  - token: "change-me-readonly"
    name: "operator-readonly"
    scopes: ["read"]
  - token: "change-me-trigger"
    name: "operator-trigger"
    scopes: ["read", "trigger"]
