name: cti

x-app-env: &app-env
  CTI_DB_DSN: postgresql+asyncpg://cti_user:cti_pass@postgres:5432/cti
  CTI_REDIS_URL: redis://redis:6379/0
  CTI_RUN_SOURCES_FILE: /app/config/sources.yaml
  CTI_OBS_LOG_LEVEL: INFO
  CTI_OBS_LOG_JSON: "true"
  CTI_OBS_API_PORT: "8080"
  CTI_OBS_METRICS_PORT: "9090"
  CTI_ARCHIVE_BACKEND: filesystem
  CTI_ARCHIVE_ROOT: /var/lib/cti/raw
  CTI_SEC_API_TOKEN_FILE: /run/secrets/api_tokens.yaml

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cti_user
      POSTGRES_PASSWORD: cti_pass
      POSTGRES_DB: cti
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cti_user -d cti"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data

  migrate:
    build: .
    image: cti:dev
    depends_on:
      postgres: { condition: service_healthy }
    environment: *app-env
    volumes:
      - ./config:/app/config:ro
      - ./secrets:/run/secrets:ro
    entrypoint: ["tini", "--"]
    command: ["cti", "db", "migrate"]

  app-worker:
    build: .
    image: cti:dev
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment: *app-env
    volumes:
      - ./config:/app/config:ro
      - ./secrets:/run/secrets:ro
      - raw_data:/var/lib/cti/raw
    command: ["cti", "worker"]
    deploy:
      replicas: 2

  app-scheduler:
    build: .
    image: cti:dev
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment: *app-env
    volumes:
      - ./config:/app/config:ro
      - ./secrets:/run/secrets:ro
    command: ["cti", "scheduler"]

  app-api:
    build: .
    image: cti:dev
    depends_on:
      postgres: { condition: service_healthy }
    environment: *app-env
    volumes:
      - ./config:/app/config:ro
      - ./secrets:/run/secrets:ro
      - raw_data:/var/lib/cti/raw
    command: ["cti", "api", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:latest
    profiles: ["obs"]
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    profiles: ["obs"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    ports:
      - "3000:3000"

  minio:
    image: minio/minio:latest
    profiles: ["s3"]
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_pass
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9001:9001"
      - "9100:9000"
    volumes:
      - minio_data:/data

  kafka:
    image: bitnami/kafka:3.7
    profiles: ["kafka"]
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
    ports:
      - "9092:9092"

volumes:
  pg_data:
  redis_data:
  raw_data:
  minio_data:
